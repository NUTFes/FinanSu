name: Build and Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "view/next-project/**"

env:
  CSR_API_URL: ${{secrets.CSR_API_URL}}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Make sure the actual branch is checked out when running on pull requests
          ref: ${{ github.head_ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: view/next-project/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: view/next-project
        run: pnpm install
      - name: Build
        working-directory: view/next-project
        run: pnpm run build
      - name: Prettier
        working-directory: view/next-project
        run: pnpm run format
      - name: Lint
        working-directory: view/next-project
        run: pnpm run lint:fix
