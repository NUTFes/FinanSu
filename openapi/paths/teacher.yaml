paths:
  /teachers:
    get:
      tags:
        - teacher
      description: teacherの一覧を取得
      responses:
        "200":
          description: teacherの一覧を取得
          content:
            application/json:
              schema:
                type: array
                $ref: "../schemas/teacher.yaml#/components/schemas/teacher"
    post:
      tags:
        - teacher
      description: teacherの作成
      parameters:
        - name: name
          in: query
          description: 名前
          required: true
          schema:
            type: string
        - name: position
          in: query
          description: 役職
          required: true
          schema:
            type: string
        - name: department_id
          in: query
          description: 学科ID
          schema:
            type: integer
        - name: building
          in: query
          description: 棟
          schema:
            type: string
        - name: room
          in: query
          description: 部屋番号
          schema:
            type: string
        - name: is_black
          in: query
          description: ブラックリストの真偽
          schema:
            type: boolean
        - name: remark
          in: query
          description: 備考
          schema:
            type: string
      responses:
        "200":
          description: createされたteacherが返ってくる
          content:
            application/json:
              schema:
                type: object

  /teachers/delete:
    delete:
      tags:
        - teacher
      description: teacherの複数削除
      requestBody:
        content:
          "*/*":
            schema:
              $ref: "../schemas/teacher.yaml#/components/schemas/destroyTeacherIDs"
        required: false
      responses:
        "200":
          description: 複数のteacherをidで削除できる
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: destroyTeacherIDs

  /teachers/{id}:
    get:
      tags:
        - teacher
      description: IDで指定されたteacherの取得
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: teacherの取得
          content:
            application/json:
              schema:
                $ref: "../schemas/teacher.yaml#/components/schemas/teacher"
    put:
      tags:
        - teacher
      description: teacherの更新
      parameters:
        - name: id
          in: path
          description: Teacherのid
          required: true
          schema:
            type: integer
        - name: name
          in: query
          description: 教員の名前
          required: true
          schema:
            type: string
        - name: position
          in: query
          description: 教員の役職
          required: true
          schema:
            type: string
        - name: department_id
          in: query
          description: 学科ID
          schema:
            type: integer
        - name: building
          in: query
          description: 棟
          schema:
            type: string
        - name: room
          in: query
          description: 部屋番号
          schema:
            type: string
        - name: is_black
          in: query
          description: ブラックリストに入っているか
          schema:
            type: boolean
        - name: remark
          in: query
          description: 備考欄
          schema:
            type: string
      responses:
        "200":
          description: 更新されたteacherが返ってくる
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
        - teacher
      description: IDを指定してteacherの削除
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: teacherの削除完了
          content:
            application/json:
              schema:
                type: object

  /teachers/fundRegistered/{year}:
    get:
      tags:
        - teacher
      description: 募金登録済みのteacherのidを取得
      parameters:
        - name: year
          in: path
          description: year
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 募金登録済みのteacherのidを取得
          content:
            application/json:
              schema:
                type: object
