paths:
  /users:
    get:
      tags:
        - user
      description: userの一覧を取得
      responses:
        "200":
          description: userの一覧を取得
          # content:
          #   "*/*":
          #     schema:
          #       type: array
    post:
      tags:
        - user
      description: userの作成
      parameters:
        - name: name
          in: query
          description: name
          required: true
          schema:
            type: string
        - name: bureau_id
          in: query
          description: bureau_d
          required: true
          schema:
            type: integer
        - name: role_id
          in: query
          description: role_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: createされたuserが返ってくる
          content:
            application/json:
              schema:
                type: object

  /users/delete:
    delete:
      tags:
        - user
      description: userの複数作成
      requestBody:
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/components/schemas/destroyUserIDs"
        required: false
      responses:
        "200":
          description: 複数のuserをidで削除できる
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: destroyUserIDs

  /users/{id}:
    get:
      tags:
        - user
      description: IDで指定されたuserの取得
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: userの取得
          content:
            application/json:
              schema:
                type: object
    put:
      tags:
        - user
      description: userの更新
      parameters:
        - name: id
          in: path
          description: userのid
          required: true
          schema:
            type: integer
        - name: name
          in: query
          description: name
          required: true
          schema:
            type: string
        - name: bureau_id
          in: query
          description: bureau_d
          required: true
          schema:
            type: integer
        - name: role_id
          in: query
          description: role_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 更新されたuserが返ってくる
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
        - user
      description: IDを指定してuserの削除
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: userの削除完了
          content:
            application/json:
              schema:
                type: object

  /current_user:
    get:
      tags:
        - user
      description: 現在ログインしているユーザーの情報を取得
      parameters:
        - in: header
          name: Access-Token
          schema:
            type: string
      responses:
        "200":
          description: 現在ログインしているユーザーの情報を取得
          content:
            application/json:
              schema:
                $ref: "../schemas/user.yaml#/components/schemas/user"
