components:
  schemas:
    teacher:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: test-name
        position:
          type: string
          example: 准教授
        department_id:
          type: integer
          example: 1
        building:
          type: string
          example: 研究棟
        room:
          type: string
          example: 101
        is_black:
          type: boolean
          example: false
        remark:
          type: string
          example: 備考
      required:
        - id
        - name
        - position
        - department_id
        - building
        - room_number
        - is_black
        - remark

    destroyTeacherIDs:
      required:
        - deleteIDs
      type: object
      properties:
        deleteIDs:
          type: array
          example: []
          items:
            type: number
