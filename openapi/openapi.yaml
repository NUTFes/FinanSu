        - possible
        - impossible

    DesignProgress:
      type: string
      description: デザイン進捗
      enum:
        - unstarted
        - created_by_student
        - created_by_company
        - completed

    SponsorshipActivity:
      type: object
      description: 協賛活動データの詳細情報
