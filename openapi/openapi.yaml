  /buy_reports:
    post:
      tags:
        - buy_report
      description: 購入報告を行うAPI
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                buy_report:
                  $ref: "#/components/schemas/buyReport"
              required:
                - file
                - buy_report
      responses:
        "200":
          description: 作成されたbuy_reportが返ってくる
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/buyReport"
  /buy_reports/{id}:
    get:
      tags:
        - buy_report
      description: IDで指定されたbuy_reportの取得（購入報告編集用）
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: buy_reportの取得
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/buyReportWithDivisionId"
    put:
      tags:
        - buy_report
      description: 購入報告を修正するAPI、画像がある場合は画像も更新
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 購入報告書のファイル、ない場合更新しないようにする
                buy_report:
                  $ref: "#/components/schemas/buyReport"
              required:
                - buy_report
        required: true
      responses:
        "200":
          description: 更新されたbuy_reportが返ってくる
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/buyReport"
      x-codegen-request-body-name: buy_report
    delete:
      tags:
        - buy_report
      description: IDを指定してbuy_reportの削除、紐づいた画像も削除、マイページから削除できる
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: buy_reportの削除完了
          content:
            application/json:
              schema:
                type: object
  /buy_reports/details:
    get:
      tags:
        - buy_report
      description: 購入報告で表示するbuy_report一覧の取得、主に財務向けのページ
      parameters:
        - name: year
          in: query
          description: year
          schema:
            type: integer
        - name: financial_record_id
          in: query
          description: financial_records.id での完全一致フィルタ
          required: false
          schema:
            type: integer
        - name: paid_by
          in: query
          description: buy_reports.paid_by での完全一致フィルタ
          required: false
          schema:
            type: string
        - name: paid_by_user_id
          in: query
          description: buy_reports.paid_by_user_id での完全一致フィルタ
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: buy_reportの一覧を取得
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/buyReportDetail"
  /buy_reports/summary:
    get:
      tags:
        - buy_report
      description: 購入報告一覧の未精算/未封詰め合計を返す
      parameters:
        - name: year
          in: query
          description: year
          required: true
          schema:
            type: integer
        - name: financial_record_id
          in: query
          description: financial_records.id での完全一致フィルタ
          required: false
          schema:
            type: integer
        - name: paid_by
          in: query
          description: buy_reports.paid_by での完全一致フィルタ
          required: false
          schema:
            type: string
        - name: paid_by_user_id
          in: query
          description: buy_reports.paid_by_user_id での完全一致フィルタ
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: 条件に一致する購入報告のサマリ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/buyReportSummary"
  /buy_report/status/{buy_report_id}:
    put:
      tags:
        - buy_report
      description: buy_reportのステータス更新、財務が封詰め、精算済みにするAPI
      parameters:
        - name: buy_report_id
          in: path
          description: buy_report_id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isPacked:
                  type: boolean
                  example: false
                  description: 封筒に詰めたか
                isSettled:
                  type: boolean
                  example: false
                  description: 精算済みか
      responses:
        "200":
          description: 更新されたbuy_reportが返ってくる
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/buyReportDetail"
  /buy_reports/csv/download:
    get:
      tags:
        - buy_report
      description: 購入報告一覧のCSVダウンロード、財務向けのページ
      parameters:
        - name: year
          in: query
          description: year
          schema:
            type: integer
        - name: financial_record_id
          in: query
          description: financial_records.id での完全一致フィルタ
          required: false
          schema:
            type: integer
        - name: paid_by
          in: query
          description: buy_reports.paid_by での完全一致フィルタ
          required: false
          schema:
            type: string
        - name: paid_by_user_id
          in: query
          description: buy_reports.paid_by_user_id での完全一致フィルタ
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: buy_reportのCSVダウンロード
          content:
            text/csv:
              schema:
                type: string
                format: binary
