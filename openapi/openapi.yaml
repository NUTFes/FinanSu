  /sponsorship_activities:
    get:
      tags:
        - sponsorship_activity
      summary: 協賛活動一覧取得
      description: |
        年度、キーワード、ステータス、担当者、協賛プランなどで絞り込み、指定順序でソートして一覧を取得。
        合計金額（totalAmount）も返却。
      parameters:
        - name: year_periods_id
          in: query
          description: 年度期間ID (指定なし時は最新年度)
          required: false
          schema:
            type: integer
        - name: keyword
          in: query
          description: 検索キーワード（企業名、担当者名など）
          required: false
          schema:
            type: string
        - name: activity_status
          in: query
          description: 活動ステータス (ActivityStatusの値を指定)
          required: false
          schema:
            $ref: "#/components/schemas/ActivityStatus"
        - name: feasibility_status
          in: query
          description: 協賛可否ステータス (FeasibilityStatusの値を指定)
          required: false
          schema:
            $ref: "#/components/schemas/FeasibilityStatus"
        - name: user_id
          in: query
          description: 担当者ID
          required: false
          schema:
            type: integer
        - name: sponsor_style_ids
          in: query
          description: "協賛プランID（複数指定可）"
          required: false
          schema:
            type: array
            items:
              type: integer
        - name: sort
          in: query
          description: "ソート対象カラム (例: updated_at, created_at, sponsor_id)"
          required: false
          schema:
            type: string
            default: updated_at
        - name: order
          in: query
          description: ソート順序 (asc または desc)
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsorshipActivitiesResponse"
    post:
      tags:
        - sponsorship_activity
      summary: 協賛活動の新規作成
      description: 新しい協賛活動データを作成。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSponsorshipActivityRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsorshipActivity"

