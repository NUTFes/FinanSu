openapi: 3.0.1
info:
  title: NUTFes FinanSu API
  description: FinanSu APIドキュメント
  contact: {}
  version: 2.0.0

servers:
  - url: http://localhost:1323/

paths:
  /:
    get:
      tags:
        - health
      description: health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string

  /activities:
    get:
      tags:
        - activity
      description: activitiesの一覧を取得
      responses:
        "200":
          description: activitiesの一覧の取得
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
        - activity
      description: activitiesの作成
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/activity"
        required: true
      responses:
        "200":
          description: create されたactivityが返ってくる
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: activity

  /activities/details:
    get:
      tags:
        - activity
      description: "activitiesとsponsor,sponsorStyle,userの一覧を取得"
      responses:
        "200":
          description: "activitiesとsponsor,sponsorStyle,userの一覧の取得"
          content:
            application/json:
              schema:
                type: object

  /activities/details/{year}:
    get:
      tags:
        - activity
      description: "年度で指定されたactivitiesとsponsor,sponsorStyle,userの一覧を取得"
      parameters:
        - name: year
          in: path
          description: year
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "年度で指定されたactivitiesとsponsor,sponsorStyle,userの一覧を取得"
          content:
            application/json:
              schema:
                type: object

  /activities/filtered_details:
    get:
      tags:
        - activity
      description: "activitiesとsponsor,sponsorStyle,userの一覧を取得"
      parameters:
        - name: is_done
          in: query
          description: 完了状態を表すフラグ
          required: false
          schema:
            type: string
            enum:
              - all
              - true
              - false
        - name: sponsor_style_id
          in: query
          description: スポンサースタイルIDの配列
          required: false
          schema:
            type: array
            items:
              type: integer
              example: 1
        - name: keyword
          in: query
          description: キーワード検索用の文字列
          required: false
          schema:
            type: string
      responses:
        "200":
          description: "activitiesとsponsor,sponsorStyle,userの一覧の取得"
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: keyword

  /activities/filtered_details/{year}:
    get:
      tags:
        - activity
      description: "activitiesとsponsor,sponsorStyle,userの一覧を取得"
      parameters:
        - name: year
          in: path
          description: Filter by year.
          required: true
          schema:
            type: string
        - name: is_done
          in: query
          description: 完了状態を表すフラグ
          required: false
          schema:
            type: string
            enum:
              - all
              - true
              - false
        - name: sponsor_style_id
          in: query
          description: スポンサースタイルIDの配列
          schema:
            type: array
            items:
              type: integer
              example: 1
        - name: keyword
          in: query
          description: キーワード検索用の文字列
          required: false
          schema:
            type: string
      responses:
        "200":
          description: "activitiesとsponsor,sponsorStyle,userの一覧の取得"
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: keyword

  /activities/{id}:
    get:
      tags:
        - activity
      description: IDで指定されたactivitiesの取得
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: activitiesの取得
          content:
            application/json:
              schema:
                type: object
    put:
      tags:
        - activity
      description: activitiesの更新
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/activity"
        required: false
      responses:
        "200":
          description: 更新されたactivitiesが返ってくる
          content:
            application/json:
              schema:
                type: object
      x-codegen-request-body-name: activity
    delete:
      tags:
        - activity
      description: IDを指定してactivitiesの削除
      parameters:
        - name: id
          in: path
          description: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: activitiesの削除完了
          content:
            application/json:
              schema:
                type: object

  /activity_informations:
